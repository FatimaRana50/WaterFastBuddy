name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Bundling a release APK runs Metro in-process, which hits the default
  # Node heap cap on GitHub runners and fails createBundleReleaseJsAndAssets
  # with a non-descriptive "node exited 1". Bump the limit.
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix metro-config conflict
        run: rm -rf node_modules/metro-config/node_modules

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --non-interactive --clean

      # Pre-bundle the JS with Metro so we get a descriptive error here if
      # bundling fails, instead of the vague "node exit 1" from Gradle.
      - name: Pre-bundle JS (verbose)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --verbose

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List APK output files
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WaterFastBuddy-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
